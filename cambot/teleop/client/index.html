<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StereoBot - Quest 3 Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; overflow: hidden; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 0; }
        #overlay {
            position: absolute; top: 10px; left: 10px; z-index: 100;
            background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px;
            font-size: 13px; font-family: monospace; pointer-events: none;
        }
        #overlay div { margin: 4px 0; }
        #controls {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 12px; align-items: center;
            background: rgba(0,0,0,0.7); padding: 14px 20px; border-radius: 12px;
        }
        button {
            padding: 12px 24px; font-size: 16px; border: none; border-radius: 8px;
            cursor: pointer; background: #1a73e8; color: white; font-weight: 500;
        }
        button:hover { background: #1557b0; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status {
            padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
        }
        #status.connecting { background: #ffa726; color: #000; }
        #status.connected { background: #4caf50; }
        #status.disconnected { background: #f44336; }

        /* Settings panel */
        #settingsBtn { background: #444; }
        #settingsBtn:hover { background: #666; }
        #settings {
            position: absolute; top: 10px; right: 10px; z-index: 100;
            background: rgba(0,0,0,0.9); padding: 16px; border-radius: 10px;
            font-size: 14px; width: 280px; display: none;
            max-height: calc(100vh - 120px); overflow-y: auto;
        }
        #settings.open { display: block; }
        #settings h3 { margin: 0 0 12px; font-size: 15px; color: #aaa; }
        .setting { margin-bottom: 14px; }
        .setting label {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 4px; font-size: 13px; color: #ccc;
        }
        .setting label span { color: #1a9fff; font-family: monospace; }
        .setting input[type="range"] {
            width: 100%; accent-color: #1a73e8; cursor: pointer;
        }
        .setting-group { border-top: 1px solid #333; padding-top: 12px; margin-top: 12px; }
        .setting-group-title { font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        #resetBtn { background: #c62828; padding: 8px 16px; font-size: 13px; width: 100%; margin-top: 4px; }
        #resetBtn:hover { background: #e53935; }
        #calibrateBtn { background: #ff9800; }
        #calibrateBtn:hover { background: #f57c00; }
        #positionBtn { background: #444; }
        #positionBtn:hover { background: #666; }
    </style>
</head>
<body>
    <div id="overlay">
        <div>FPS: <span id="fps">0</span></div>
        <div>Resolution: <span id="resolution">-</span></div>
        <div>Frame size: <span id="framesize">-</span></div>
        <div>RTT: <span id="rtt">-</span></div>
        <div>Transport: <span id="transport">WS-JPEG</span></div>
        <div>Server: <span id="server-stats">-</span></div>
        <div>Debug: <span id="debug">init</span></div>
    </div>

    <div id="settings">
        <h3>Settings</h3>

        <div class="setting-group-title">Screen</div>
        <div class="setting">
            <label>Distance <span id="distVal">2.5</span>m</label>
            <input type="range" id="distSlider" min="0.3" max="5.0" step="0.1" value="2.5">
        </div>
        <div class="setting">
            <label>FOV <span id="fovVal">90</span>&deg;</label>
            <input type="range" id="fovSlider" min="40" max="120" step="1" value="90">
        </div>
        <div class="setting">
            <label>Screen Y <span id="screenYVal">-0.35</span>m</label>
            <input type="range" id="screenYSlider" min="-2.0" max="1.0" step="0.05" value="-0.35">
        </div>
        <div class="setting">
            <label>HUD Y <span id="hudYVal">-0.40</span>m</label>
            <input type="range" id="hudYSlider" min="-1.0" max="0.5" step="0.05" value="-0.40">
        </div>

        <div class="setting-group">
            <div class="setting-group-title">Stereo</div>
            <div class="setting">
                <label>Convergence <span id="convVal">0</span>px</label>
                <input type="range" id="convSlider" min="-100" max="100" step="1" value="0">
            </div>
            <div class="setting">
                <label>V-Align <span id="valignVal">0</span>px</label>
                <input type="range" id="valignSlider" min="-50" max="50" step="1" value="0">
            </div>
            <div class="setting" style="display:flex; align-items:center; gap:10px;">
                <label style="margin:0; flex:1;">Swap Eyes</label>
                <button id="swapBtn" style="padding:8px 16px; font-size:13px; background:#444;">Off</button>
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-group-title">Image</div>
            <div class="setting">
                <label>Sharpen <span id="sharpVal">1.3</span></label>
                <input type="range" id="sharpSlider" min="0" max="2.0" step="0.1" value="1.3">
            </div>
            <div class="setting">
                <label>Brightness <span id="brightVal">10</span></label>
                <input type="range" id="brightSlider" min="-50" max="50" step="1" value="10">
            </div>
            <div class="setting">
                <label>Contrast <span id="contrastVal">0</span></label>
                <input type="range" id="contrastSlider" min="-50" max="50" step="1" value="0">
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-group-title">Camera</div>
            <div style="display:flex; gap:6px; flex-wrap:wrap;" id="resolutionBtns">
                <button class="res-btn" data-res="vga" style="padding:8px 14px; font-size:13px; background:#444;">VGA</button>
                <button class="res-btn" data-res="720p" style="padding:8px 14px; font-size:13px; background:#1a73e8;">720p</button>
                <button class="res-btn" data-res="1080p" style="padding:8px 14px; font-size:13px; background:#444;">1080p</button>
                <button class="res-btn" data-res="2k" style="padding:8px 14px; font-size:13px; background:#444;">2K</button>
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-group-title">Transport</div>
            <div style="display:flex; gap:6px;">
                <button id="transportBtn" style="padding:8px 14px; font-size:13px; background:#444; flex:1;">WS-JPEG</button>
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-group-title">VR HUD</div>
            <div style="display:flex; gap:6px;">
                <button id="hudToggleBtn" style="padding:8px 14px; font-size:13px; background:#1a73e8; flex:1;">HUD: ON</button>
            </div>
        </div>

        <button id="resetBtn">Reset Defaults</button>
    </div>

    <div id="controls">
        <button id="startBtn">Start Stream</button>
        <button id="stopBtn" disabled>Stop</button>
        <button id="calibrateBtn" disabled>Home</button>
        <button id="positionBtn" disabled>Position: OFF</button>
        <button id="pauseBtn" disabled>Pause</button>
        <button id="settingsBtn">Settings</button>
        <span id="status" class="disconnected">Disconnected</span>
    </div>

    <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js';
    import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/webxr/VRButton.js';

    console.log('Three.js loaded:', THREE.REVISION);

    // --- Elements ---
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settings');
    const statusEl = document.getElementById('status');
    const fpsEl = document.getElementById('fps');
    const resEl = document.getElementById('resolution');
    const fsEl = document.getElementById('framesize');
    const rttEl = document.getElementById('rtt');
    const transportEl = document.getElementById('transport');
    const serverStatsEl = document.getElementById('server-stats');
    const debugEl = document.getElementById('debug');

    const calibrateBtn = document.getElementById('calibrateBtn');
    const positionBtn = document.getElementById('positionBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    let ws = null;
    let frameCount = 0;
    let lastFpsTime = performance.now();

    // Robot state from server
    const robotState = { calibrated: false, position_tracking: false, calibrating: false, user_paused: false };
    let hudDirty = true;

    // Resolution state
    const RESOLUTIONS = ['vga', '720p', '1080p', '2k'];
    let currentResolution = '720p';
    let resolutionSwitching = false;

    // --- WebRTC state ---
    let pc = null;
    let webrtcActive = false;
    let webrtcAvailable = false;  // set by server telemetry
    let webrtcPreferred = true;   // user preference: true=WebRTC, false=JPEG
    let webrtcVideoEl = null;
    let webrtcTimeout = null;
    let webrtcStatsTimer = null;
    const WEBRTC_TIMEOUT_MS = 4000;  // fallback if no video frames arrive

    // WebRTC stats (updated by periodic getStats polling)
    const webrtcStats = { bps: 0, fps: 0, codec: '' };
    let _prevBytes = 0;
    let _prevStatsTime = 0;
    // VR HUD visibility
    let hudVisible = true;

    // --- Settings ---
    const DEFAULTS = { dist: 2.5, fov: 90, screenY: -0.35, hudY: -0.40, conv: 0, valign: 0, swap: false, sharp: 1.3, bright: 10, contrast: 0 };
    const settings = { ...DEFAULTS };
    let syncEnabled = true;

    const distSlider = document.getElementById('distSlider');
    const fovSlider = document.getElementById('fovSlider');
    const screenYSlider = document.getElementById('screenYSlider');
    const hudYSlider = document.getElementById('hudYSlider');
    const convSlider = document.getElementById('convSlider');
    const valignSlider = document.getElementById('valignSlider');
    const swapBtn = document.getElementById('swapBtn');
    const sharpSlider = document.getElementById('sharpSlider');
    const brightSlider = document.getElementById('brightSlider');
    const contrastSlider = document.getElementById('contrastSlider');
    const distVal = document.getElementById('distVal');
    const fovVal = document.getElementById('fovVal');
    const screenYVal = document.getElementById('screenYVal');
    const hudYVal = document.getElementById('hudYVal');
    const convVal = document.getElementById('convVal');
    const valignVal = document.getElementById('valignVal');
    const sharpVal = document.getElementById('sharpVal');
    const brightVal = document.getElementById('brightVal');
    const contrastVal = document.getElementById('contrastVal');

    function syncUI() {
        distSlider.value = settings.dist;
        fovSlider.value = settings.fov;
        screenYSlider.value = settings.screenY;
        hudYSlider.value = settings.hudY;
        convSlider.value = settings.conv;
        valignSlider.value = settings.valign;
        sharpSlider.value = settings.sharp;
        brightSlider.value = settings.bright;
        contrastSlider.value = settings.contrast;
        distVal.textContent = settings.dist.toFixed(1);
        fovVal.textContent = settings.fov;
        screenYVal.textContent = settings.screenY.toFixed(2);
        hudYVal.textContent = settings.hudY.toFixed(2);
        convVal.textContent = settings.conv;
        valignVal.textContent = settings.valign;
        sharpVal.textContent = settings.sharp.toFixed(1);
        brightVal.textContent = settings.bright;
        contrastVal.textContent = settings.contrast;
        swapBtn.textContent = settings.swap ? 'On' : 'Off';
        swapBtn.style.background = settings.swap ? '#1a73e8' : '#444';
    }
    syncUI();

    settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));

    distSlider.addEventListener('input', (e) => {
        settings.dist = parseFloat(e.target.value);
        distVal.textContent = settings.dist.toFixed(1);
        applySettings();
    });
    fovSlider.addEventListener('input', (e) => {
        settings.fov = parseInt(e.target.value);
        fovVal.textContent = settings.fov;
        applySettings();
    });
    screenYSlider.addEventListener('input', (e) => {
        settings.screenY = parseFloat(e.target.value);
        screenYVal.textContent = settings.screenY.toFixed(2);
        applySettings();
    });
    hudYSlider.addEventListener('input', (e) => {
        settings.hudY = parseFloat(e.target.value);
        hudYVal.textContent = settings.hudY.toFixed(2);
        applySettings();
    });
    convSlider.addEventListener('input', (e) => {
        settings.conv = parseInt(e.target.value);
        convVal.textContent = settings.conv;
        applySettings();
    });
    valignSlider.addEventListener('input', (e) => {
        settings.valign = parseInt(e.target.value);
        valignVal.textContent = settings.valign;
        applySettings();
    });
    swapBtn.addEventListener('click', () => {
        settings.swap = !settings.swap;
        swapBtn.textContent = settings.swap ? 'On' : 'Off';
        swapBtn.style.background = settings.swap ? '#1a73e8' : '#444';
        applySettings();
    });
    sharpSlider.addEventListener('input', (e) => {
        settings.sharp = parseFloat(e.target.value);
        sharpVal.textContent = settings.sharp.toFixed(1);
        applySettings();
    });
    brightSlider.addEventListener('input', (e) => {
        settings.bright = parseInt(e.target.value);
        brightVal.textContent = settings.bright;
        applySettings();
    });
    contrastSlider.addEventListener('input', (e) => {
        settings.contrast = parseInt(e.target.value);
        contrastVal.textContent = settings.contrast;
        applySettings();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        Object.assign(settings, DEFAULTS);
        syncUI();
        applySettings();
    });

    function sendCommand(action, extra = {}) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: 'command', action, ...extra }));
    }

    // --- WebRTC ---
    function createVideoElement() {
        if (webrtcVideoEl) return webrtcVideoEl;
        webrtcVideoEl = document.createElement('video');
        webrtcVideoEl.autoplay = true;
        webrtcVideoEl.playsInline = true;
        webrtcVideoEl.muted = true;
        // Keep technically visible (1x1px) so browser doesn't pause decoding
        webrtcVideoEl.style.position = 'fixed';
        webrtcVideoEl.style.width = '1px';
        webrtcVideoEl.style.height = '1px';
        webrtcVideoEl.style.opacity = '0.01';
        webrtcVideoEl.style.pointerEvents = 'none';
        webrtcVideoEl.style.zIndex = '-1';
        document.body.appendChild(webrtcVideoEl);
        return webrtcVideoEl;
    }

    async function pollWebRTCStats() {
        if (!pc || !webrtcActive) return;
        try {
            const stats = await pc.getStats();
            stats.forEach(report => {
                if (report.type === 'inbound-rtp' && report.kind === 'video') {
                    const now = performance.now();
                    const bytes = report.bytesReceived || 0;
                    if (_prevStatsTime > 0) {
                        const dt = (now - _prevStatsTime) / 1000;
                        if (dt > 0) {
                            webrtcStats.bps = ((bytes - _prevBytes) * 8) / dt;
                        }
                    }
                    _prevBytes = bytes;
                    _prevStatsTime = now;
                    if (report.framesPerSecond !== undefined) {
                        webrtcStats.fps = report.framesPerSecond;
                    }
                }
                if (report.type === 'codec' && report.mimeType && report.mimeType.startsWith('video/')) {
                    webrtcStats.codec = report.mimeType.replace('video/', '');
                }
            });
            // Update overlay
            const mbps = (webrtcStats.bps / 1_000_000).toFixed(1);
            const codec = webrtcStats.codec ? ` ${webrtcStats.codec}` : '';
            transportEl.textContent = `WebRTC${codec} ${mbps} Mbps ${webrtcStats.fps}fps`;
            // Use decoded FPS for the FPS counter when available
            if (webrtcStats.fps > 0) {
                fpsEl.textContent = webrtcStats.fps;
            }
            hudDirty = true;
        } catch(e) {}
    }

    function startStatsPolling() {
        stopStatsPolling();
        _prevBytes = 0;
        _prevStatsTime = 0;
        webrtcStats.bps = 0;
        webrtcStats.fps = 0;
        webrtcStats.codec = '';
        webrtcStatsTimer = setInterval(pollWebRTCStats, 1000);
    }

    function stopStatsPolling() {
        if (webrtcStatsTimer) {
            clearInterval(webrtcStatsTimer);
            webrtcStatsTimer = null;
        }
    }

    const transportBtn = document.getElementById('transportBtn');

    function toggleTransport() {
        webrtcPreferred = !webrtcPreferred;
        if (webrtcPreferred && webrtcAvailable && !pc) {
            startWebRTC();
        } else if (!webrtcPreferred && (webrtcActive || pc)) {
            deactivateWebRTC();
        }
        updateTransportUI();
    }

    function updateTransportUI() {
        if (webrtcPreferred) {
            transportBtn.textContent = webrtcActive ? 'WebRTC (active)' : 'WebRTC (connecting...)';
            transportBtn.style.background = webrtcActive ? '#1a73e8' : '#ffa726';
            transportBtn.style.color = webrtcActive ? '#fff' : '#000';
        } else {
            transportBtn.textContent = 'WS-JPEG';
            transportBtn.style.background = '#444';
            transportBtn.style.color = '#fff';
        }
    }

    transportBtn.addEventListener('click', toggleTransport);

    // --- VR HUD toggle ---
    const hudToggleBtn = document.getElementById('hudToggleBtn');

    function toggleHUD() {
        hudVisible = !hudVisible;
        hudDirty = true;
        updateHudToggleUI();
    }

    function updateHudToggleUI() {
        if (hudVisible) {
            hudToggleBtn.textContent = 'HUD: ON';
            hudToggleBtn.style.background = '#1a73e8';
        } else {
            hudToggleBtn.textContent = 'HUD: OFF';
            hudToggleBtn.style.background = '#444';
        }
    }

    hudToggleBtn.addEventListener('click', toggleHUD);

    function activateWebRTCTexture() {
        if (webrtcActive) return;
        const video = webrtcVideoEl;
        if (!video || video.videoWidth === 0) return;

        // Require a real video resolution before activating.  Some browsers
        // (Quest 3) fire onloadeddata with a tiny placeholder (e.g. 2x2)
        // before actual frames arrive.  If we switch away from JPEG now,
        // and real frames never come, we're stuck at 0 fps.
        if (video.videoWidth < 100 || video.videoHeight < 100) {
            console.warn('WebRTC video too small:', video.videoWidth, 'x', video.videoHeight,
                         '— waiting for real frames');
            // Re-check in 500ms
            setTimeout(() => activateWebRTCTexture(), 500);
            return;
        }

        // Resize canvas to match WebRTC video dimensions
        if (drawCanvas.width !== video.videoWidth || drawCanvas.height !== video.videoHeight) {
            drawCanvas.width = video.videoWidth;
            drawCanvas.height = video.videoHeight;
            SBS_WIDTH = video.videoWidth;
            uniforms.texSize.value.set(video.videoWidth, video.videoHeight);
            applySettings();
        }

        webrtcActive = true;
        hudDirty = true;
        transportEl.textContent = 'WebRTC';
        console.log('WebRTC active:', video.videoWidth, 'x', video.videoHeight);
        resEl.textContent = `${video.videoWidth}x${video.videoHeight} (WebRTC)`;
        startStatsPolling();
        updateTransportUI();
        // Tell server to stop sending JPEG frames
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'webrtc_status', active: true }));
        }
    }

    function deactivateWebRTC() {
        if (!webrtcActive && !pc) return;
        webrtcActive = false;
        clearTimeout(webrtcTimeout);
        stopStatsPolling();

        if (pc) {
            pc.close();
            pc = null;
        }
        hudDirty = true;
        transportEl.textContent = 'WS-JPEG';
        updateTransportUI();
        // Tell server to resume sending JPEG frames
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'webrtc_status', active: false }));
        }
        console.log('WebRTC deactivated, falling back to WS JPEG');
    }

    async function startWebRTC() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        if (pc) deactivateWebRTC();

        const video = createVideoElement();

        pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
        });

        // Receive-only video
        pc.addTransceiver('video', { direction: 'recvonly' });

        pc.ontrack = (ev) => {
            console.log('WebRTC track received:', ev.track.kind);
            video.srcObject = ev.streams[0];
            video.play().catch(() => {});

            // Wait for video to produce real-sized frames, then activate.
            // onloadeddata may fire with a tiny placeholder (2x2) before
            // actual frames; onresize fires when the resolution changes.
            video.onloadeddata = () => {
                clearTimeout(webrtcTimeout);
                console.log('WebRTC onloadeddata:', video.videoWidth, 'x', video.videoHeight);
                activateWebRTCTexture();
            };
            video.onresize = () => {
                console.log('WebRTC onresize:', video.videoWidth, 'x', video.videoHeight);
                if (!webrtcActive) activateWebRTCTexture();
            };
        };

        pc.onicecandidate = (ev) => {
            if (ev.candidate && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'webrtc_candidate',
                    candidate: {
                        candidate: ev.candidate.candidate,
                        sdpMid: ev.candidate.sdpMid,
                        sdpMLineIndex: ev.candidate.sdpMLineIndex,
                    },
                }));
            }
        };

        pc.onconnectionstatechange = () => {
            console.log('WebRTC connection state:', pc.connectionState);
            if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                deactivateWebRTC();
            }
        };

        // Create offer
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({
            type: 'webrtc_offer',
            sdp: offer.sdp,
            sdp_type: offer.type,
        }));

        // Timeout: if no video within WEBRTC_TIMEOUT_MS, stay on JPEG
        webrtcTimeout = setTimeout(() => {
            if (!webrtcActive) {
                console.log('WebRTC timeout — staying on WS JPEG');
                deactivateWebRTC();
            }
        }, WEBRTC_TIMEOUT_MS);
    }

    function updateRobotUI() {
        calibrateBtn.disabled = robotState.calibrating;
        calibrateBtn.textContent = robotState.calibrating ? 'Homing...'
            : robotState.calibrated ? 'Re-Home' : 'Home';
        positionBtn.textContent = `Position: ${robotState.position_tracking ? 'ON' : 'OFF'}`;
        positionBtn.style.background = robotState.position_tracking ? '#1a73e8' : '#444';
        pauseBtn.textContent = robotState.user_paused ? 'Resume' : 'Pause';
        pauseBtn.style.background = robotState.user_paused ? '#e53935' : '#444';
        hudDirty = true;
    }

    const resBtns = document.querySelectorAll('.res-btn');
    function updateResolutionUI(switchingTo) {
        resBtns.forEach(btn => {
            const res = btn.dataset.res;
            const isActive = res === currentResolution;
            const isSwitching = switchingTo && res === switchingTo;
            btn.style.background = isActive ? '#1a73e8' : isSwitching ? '#ffa726' : '#444';
            btn.style.color = isSwitching ? '#000' : '#fff';
            btn.disabled = resolutionSwitching;
            if (isSwitching) btn.textContent = btn.dataset.res.toUpperCase() + '...';
            else btn.textContent = res === '2k' ? '2K' : res.toUpperCase();
        });
    }

    resBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const res = btn.dataset.res;
            if (resolutionSwitching || res === currentResolution) return;
            sendCommand('set_resolution', { resolution: res });
        });
    });

    function handleServerMessage(data) {
        if (data.type === 'settings_sync') {
            syncEnabled = false;
            Object.assign(settings, data.settings);
            syncUI();
            applySettings();
            syncEnabled = true;
        } else if (data.type === 'robot_state') {
            robotState.calibrated = data.calibrated;
            robotState.position_tracking = data.position_tracking;
            if (data.user_paused !== undefined) robotState.user_paused = data.user_paused;
            robotState.calibrating = false;
            updateRobotUI();
        } else if (data.type === 'ping') {
            // Echo pong immediately with same server_ts and seq
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'pong',
                    server_ts: data.server_ts,
                    seq: data.seq,
                }));
            }
        } else if (data.type === 'resolution_switching') {
            resolutionSwitching = true;
            updateResolutionUI(data.resolution);
            hudDirty = true;
            // Tear down WebRTC now — encoder can't handle dimension changes
            if (webrtcActive || pc) {
                deactivateWebRTC();
            }
        } else if (data.type === 'resolution_changed') {
            resolutionSwitching = false;
            if (!data.error) currentResolution = data.resolution;
            updateResolutionUI();
            hudDirty = true;
            // Re-establish WebRTC with new frame dimensions
            if (webrtcPreferred && webrtcAvailable && !pc) {
                setTimeout(() => startWebRTC(), 500);
            }
        } else if (data.type === 'webrtc_answer') {
            // Apply WebRTC answer SDP
            if (pc) {
                pc.setRemoteDescription(new RTCSessionDescription({
                    sdp: data.sdp,
                    type: data.sdp_type || 'answer',
                })).catch(e => {
                    console.error('Failed to set WebRTC answer:', e);
                    deactivateWebRTC();
                });
            }
        } else if (data.type === 'webrtc_candidate') {
            if (pc) {
                pc.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(() => {});
            }
        } else if (data.type === 'telemetry') {
            rttEl.textContent = data.rtt_ms > 0 ? `${data.rtt_ms.toFixed(0)}ms` : '-';
            const f = data.frame || {};
            let transport = data.transport === 'webrtc' ? ' [WebRTC]' : '';
            let stats = `${f.fps_out || 0}fps drop=${f.drops || 0} send=${f.avg_send_ms || 0}ms budget=${f.budget_ms || 0}ms${transport}`;
            if (data.pose) {
                const p = data.pose;
                stats += ` | IK=${p.ik_ms}ms servo=${p.servo_ms}ms ${p.control_hz}Hz`;
            }
            serverStatsEl.textContent = stats;
            // Sync robot state from telemetry too (keeps VR HUD in sync)
            if (data.robot) {
                robotState.calibrated = data.robot.calibrated;
                robotState.position_tracking = data.robot.position_tracking;
                if (data.robot.user_paused !== undefined) robotState.user_paused = data.robot.user_paused;
                if (!robotState.calibrating) updateRobotUI();
            }
            // Sync resolution from telemetry (late-join clients)
            if (data.camera && !resolutionSwitching) {
                currentResolution = data.camera.resolution;
                updateResolutionUI();
            }
            // Detect WebRTC availability from server and auto-start
            if (data.webrtc_available && !webrtcAvailable) {
                webrtcAvailable = true;
                updateTransportUI();
                if (webrtcPreferred && !pc) {
                    console.log('Server supports WebRTC — initiating');
                    startWebRTC();
                }
            }
        }
    }

    // --- Offscreen canvas for frame decoding ---
    const drawCanvas = document.createElement('canvas');
    const drawCtx = drawCanvas.getContext('2d', { willReadFrequently: false });

    // Init with test pattern
    drawCanvas.width = 2560;
    drawCanvas.height = 720;
    drawCtx.fillStyle = '#00cccc';
    drawCtx.fillRect(0, 0, 1280, 720);
    drawCtx.fillStyle = '#cc00cc';
    drawCtx.fillRect(1280, 0, 1280, 720);
    drawCtx.fillStyle = '#fff';
    drawCtx.font = '60px sans-serif';
    drawCtx.textAlign = 'center';
    drawCtx.fillText('LEFT EYE', 640, 360);
    drawCtx.fillText('RIGHT EYE', 1920, 360);
    drawCtx.font = '30px sans-serif';
    drawCtx.fillText('Start stream to see camera', 640, 440);
    drawCtx.fillText('Start stream to see camera', 1920, 440);

    let decoding = false;
    let latestFrameData = null;

    // --- Three.js Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.layers.enable(1);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    renderer.xr.setReferenceSpaceType('local');
    document.body.appendChild(renderer.domElement);

    try {
        document.body.appendChild(VRButton.createButton(renderer));
        console.log('VR button created');
    } catch (e) {
        console.warn('VR button unavailable:', e.message);
    }

    // Headset-off detection: pause robot when headset removed or XR session ends
    renderer.xr.addEventListener('sessionend', () => {
        sendCommand('pause');
    });
    renderer.xr.addEventListener('sessionstart', () => {
        // Auto-start stream when entering VR if not already connected
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            startStream();
        }
        sendCommand('resume');
        // Quest 3 proximity sensor: sessionend does NOT fire when headset is
        // removed from head. Instead the XR session's visibilityState changes
        // to "hidden". Listen on the session object itself (not document).
        const session = renderer.xr.getSession();
        if (session) {
            session.addEventListener('visibilitychange', () => {
                if (session.visibilityState === 'hidden') {
                    sendCommand('pause');
                } else if (session.visibilityState === 'visible') {
                    sendCommand('resume');
                }
            });
        }
    });

    // --- Texture ---
    const texture = new THREE.CanvasTexture(drawCanvas);
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.minFilter = THREE.LinearMipmapLinearFilter;
    texture.magFilter = THREE.LinearFilter;
    texture.generateMipmaps = true;
    texture.needsUpdate = true;

    // --- Stereo quads with GPU shader ---
    let SBS_WIDTH = 2560;
    const EYE_ASPECT = 1280 / 720;

    const uniforms = {
        map: { value: texture },
        texSize: { value: new THREE.Vector2(SBS_WIDTH, 720) },
        uSharpen: { value: 0.0 },
        uBrightness: { value: 0.0 },
        uContrast: { value: 0.0 },
    };

    const vertexShader = `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `;

    const fragmentShader = `
        precision highp float;
        uniform sampler2D map;
        uniform vec2 texSize;
        uniform float uSharpen;
        uniform float uBrightness;
        uniform float uContrast;
        varying vec2 vUv;

        vec3 sampleTex(vec2 offset) {
            return texture2D(map, vUv + offset / texSize).rgb;
        }

        void main() {
            vec3 center = texture2D(map, vUv).rgb;
            vec3 color = center;

            if (uSharpen > 0.0) {
                vec3 blur = (
                    sampleTex(vec2(-1.0, 0.0)) +
                    sampleTex(vec2( 1.0, 0.0)) +
                    sampleTex(vec2( 0.0,-1.0)) +
                    sampleTex(vec2( 0.0, 1.0))
                ) * 0.25;
                color = color + (color - blur) * uSharpen;
            }

            color += uBrightness;
            color = (color - 0.5) * uContrast + 0.5;
            color = clamp(color, 0.0, 1.0);
            gl_FragColor = vec4(color, 1.0);
        }
    `;

    const material = new THREE.ShaderMaterial({
        uniforms, vertexShader, fragmentShader,
        depthTest: false, depthWrite: false,
    });

    function makePlane() {
        const geo = new THREE.PlaneGeometry(1, 1);
        const mesh = new THREE.Mesh(geo, material);
        mesh.frustumCulled = false;
        mesh.renderOrder = 1;
        return mesh;
    }

    const leftMesh = makePlane();
    leftMesh.layers.enable(0);
    leftMesh.layers.enable(1);
    scene.add(leftMesh);

    const rightMesh = makePlane();
    rightMesh.layers.set(2);
    scene.add(rightMesh);

    const BASE_UVS = [0,1, 1,1, 0,0, 1,0];
    function setUVs(mesh, uBase, convPx, vPx) {
        const uvs = mesh.geometry.attributes.uv.array;
        const hShift = convPx / (SBS_WIDTH / 2);
        const vShift = vPx / (SBS_WIDTH / 2 / EYE_ASPECT);
        for (let i = 0; i < uvs.length; i += 2) {
            uvs[i]     = uBase + BASE_UVS[i] * 0.5 + hShift;
            uvs[i + 1] = BASE_UVS[i + 1] + vShift;
        }
        mesh.geometry.attributes.uv.needsUpdate = true;
    }

    // --- VR HUD (head-locked status bar, visible in VR only) ---
    const hudCanvas = document.createElement('canvas');
    hudCanvas.width = 1280;
    hudCanvas.height = 192;
    const hudCtx = hudCanvas.getContext('2d');

    const hudTexture = new THREE.CanvasTexture(hudCanvas);
    hudTexture.minFilter = THREE.LinearFilter;
    hudTexture.generateMipmaps = false;

    const hudMaterial = new THREE.MeshBasicMaterial({
        map: hudTexture, transparent: false,
    });
    const hudMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), hudMaterial);
    hudMesh.frustumCulled = false;
    hudMesh.renderOrder = 2;
    hudMesh.layers.enable(0);
    hudMesh.layers.enable(1);
    hudMesh.layers.enable(2);
    hudMesh.visible = false;
    hudMesh.userData.useMidpoint = true;
    scene.add(hudMesh);

    let lastHudUpdate = 0;

    function drawHUD() {
        const ctx = hudCtx;
        const w = hudCanvas.width, h = hudCanvas.height;
        ctx.clearRect(0, 0, w, h);

        // Background with subtle grid texture for vergence anchoring
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 1;
        for (let gx = 0; gx < w; gx += 32) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, h); ctx.stroke(); }
        for (let gy = 0; gy < h; gy += 32) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke(); }

        // Visible border
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 4;
        ctx.strokeRect(2, 2, w - 4, h - 4);

        ctx.textBaseline = 'middle';
        const y1 = h * 0.22, y2 = h * 0.52, y3 = h * 0.82;

        // Line 1: Robot status
        ctx.font = 'bold 28px monospace';
        let x = 24;

        // Status (unified: homing > paused > not homed > running)
        if (robotState.calibrating) {
            ctx.fillStyle = '#ffa726';
            ctx.fillText('HOMING...', x, y1);
        } else if (robotState.user_paused) {
            ctx.fillStyle = '#e53935';
            ctx.fillText('PAUSED', x, y1);
        } else if (!robotState.calibrated) {
            ctx.fillStyle = '#ff5722';
            ctx.fillText('NOT HOMED', x, y1);
        } else {
            ctx.fillStyle = '#4caf50';
            ctx.fillText('RUNNING', x, y1);
        }
        x += 210;

        ctx.fillStyle = '#555'; ctx.fillText('|', x, y1); x += 26;

        // Position mode
        if (robotState.position_tracking) {
            ctx.fillStyle = '#00bcd4';
            ctx.fillText('POS:ON', x, y1);
        } else {
            ctx.fillStyle = '#888';
            ctx.fillText('POS:OFF', x, y1);
        }
        x += 150;

        ctx.fillStyle = '#555'; ctx.fillText('|', x, y1); x += 26;

        // Resolution
        if (resolutionSwitching) {
            ctx.fillStyle = '#ffa726';
            ctx.fillText('SWITCHING...', x, y1);
        } else {
            ctx.fillStyle = '#fff';
            ctx.fillText(currentResolution.toUpperCase(), x, y1);
        }

        // Line 2: Stats (FPS, RTT, bandwidth, transport)
        ctx.font = '26px monospace';
        x = 24;

        ctx.fillStyle = '#fff';
        ctx.fillText(fpsEl.textContent + ' fps', x, y2);
        x += 140;

        ctx.fillStyle = '#555'; ctx.fillText('|', x, y2); x += 26;

        ctx.fillStyle = '#fff';
        ctx.fillText('RTT ' + rttEl.textContent, x, y2);
        x += 170;

        ctx.fillStyle = '#555'; ctx.fillText('|', x, y2); x += 26;

        // Frame size
        const fs = fsEl.textContent;
        if (fs && fs !== '-') {
            ctx.fillStyle = '#aaa';
            ctx.fillText(fs, x, y2);
            x += 140;
            ctx.fillStyle = '#555'; ctx.fillText('|', x, y2); x += 26;
        }

        // Transport + bandwidth
        if (webrtcActive) {
            const mbps = (webrtcStats.bps / 1_000_000).toFixed(1);
            const codec = webrtcStats.codec || 'WebRTC';
            ctx.fillStyle = '#4caf50';
            ctx.fillText(`${codec}  ${mbps} Mbps  ${webrtcStats.fps}fps`, x, y2);
        } else {
            ctx.fillStyle = '#ffa726';
            ctx.fillText('WS-JPEG', x, y2);
        }

        // Line 3: Controller hints
        ctx.font = '22px monospace';
        ctx.fillStyle = '#777';
        ctx.fillText('[A/X] Home  [B/Y] Pos  [RSqueeze] Pause  [R3] Res  [L3] Transport  [LSqueeze] HUD', 24, y3);

        hudTexture.needsUpdate = true;
    }

    // --- Controller button detection ---
    const prevButtons = {};

    function checkControllerButtons() {
        const session = renderer.xr.getSession();
        if (!session) return;

        for (const source of session.inputSources) {
            if (!source.gamepad) continue;
            const btns = source.gamepad.buttons;
            if (btns.length < 6) continue;
            const hand = source.handedness || 'none';

            // A/X button (index 4) = Calibrate (soft if already calibrated)
            const pk = hand + '_4';
            const primaryPressed = btns[4].pressed;
            if (primaryPressed && !prevButtons[pk] && !robotState.calibrating) {
                robotState.calibrating = true;
                hudDirty = true;
                updateRobotUI();
                sendCommand('calibrate');
            }
            prevButtons[pk] = primaryPressed;

            // B/Y button (index 5) = Toggle Position
            const sk = hand + '_5';
            const secondaryPressed = btns[5].pressed;
            if (secondaryPressed && !prevButtons[sk]) {
                sendCommand('toggle_position');
            }
            prevButtons[sk] = secondaryPressed;

            // Right thumbstick click (index 3) = Cycle Resolution
            if (hand === 'right' && btns.length > 3) {
                const rk = hand + '_3';
                const thumbPressed = btns[3].pressed;
                if (thumbPressed && !prevButtons[rk] && !resolutionSwitching) {
                    const idx = RESOLUTIONS.indexOf(currentResolution);
                    const nextRes = RESOLUTIONS[(idx + 1) % RESOLUTIONS.length];
                    sendCommand('set_resolution', { resolution: nextRes });
                }
                prevButtons[rk] = thumbPressed;
            }

            // Left thumbstick click (index 3) = Toggle Transport (WebRTC/JPEG)
            if (hand === 'left' && btns.length > 3) {
                const lk = hand + '_3';
                const lThumbPressed = btns[3].pressed;
                if (lThumbPressed && !prevButtons[lk]) {
                    toggleTransport();
                }
                prevButtons[lk] = lThumbPressed;
            }

            // Left grip/squeeze (index 1) = Toggle VR HUD
            if (hand === 'left' && btns.length > 1) {
                const gk = hand + '_1';
                const gripPressed = btns[1].pressed;
                if (gripPressed && !prevButtons[gk]) {
                    toggleHUD();
                }
                prevButtons[gk] = gripPressed;
            }

            // Right grip/squeeze (index 1) = Toggle Pause (lock robot)
            if (hand === 'right' && btns.length > 1) {
                const rpk = hand + '_1';
                const rGripPressed = btns[1].pressed;
                if (rGripPressed && !prevButtons[rpk]) {
                    sendCommand('toggle_pause');
                }
                prevButtons[rpk] = rGripPressed;
            }
        }
    }

    function applySettings() {
        const w = 2 * settings.dist * Math.tan(settings.fov * Math.PI / 360);
        const h = w / EYE_ASPECT;

        leftMesh.scale.set(w, h, 1);
        rightMesh.scale.set(w, h, 1);

        const convPx = settings.conv;
        const leftBase = settings.swap ? 0.5 : 0;
        const rightBase = settings.swap ? 0 : 0.5;
        const vPx = settings.valign;

        setUVs(leftMesh, leftBase, convPx, 0);
        setUVs(rightMesh, rightBase, -convPx, vPx);

        leftMesh.userData.offset = new THREE.Vector3(0, settings.screenY, -settings.dist);
        rightMesh.userData.offset = new THREE.Vector3(0, settings.screenY, -settings.dist);

        uniforms.uSharpen.value = settings.sharp;
        uniforms.uBrightness.value = settings.bright / 100;
        uniforms.uContrast.value = 1.0 + settings.contrast / 50;

        // Position VR HUD at fixed comfortable distance, below gaze center
        const hudDist = 0.5;
        const hudW = hudDist * 0.7;
        const hudH = hudW * (hudCanvas.height / hudCanvas.width);
        hudMesh.scale.set(hudW, hudH, 1);
        hudMesh.userData.offset = new THREE.Vector3(0, settings.hudY, -hudDist);
        // Tilt HUD so its surface is orthogonal to the line from HUD to eye center
        hudMesh.userData.tilt = Math.atan2(settings.hudY, hudDist);

        if (syncEnabled && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'settings_sync', settings }));
        }
    }
    applySettings();

    const _lockPos = new THREE.Vector3();
    const _lockQuat = new THREE.Quaternion();
    const _tiltQuat = new THREE.Quaternion();
    const _eyePosR = new THREE.Vector3();
    function lockToHead(mesh, cam) {
        cam.getWorldPosition(_lockPos);
        cam.getWorldQuaternion(_lockQuat);
        // Three.js ArrayCamera copies matrixWorld from the left eye, not the
        // head center.  For meshes visible to both eyes (e.g. HUD), compute
        // the true midpoint between left and right eye cameras.
        if (mesh.userData.useMidpoint && cam.cameras && cam.cameras.length >= 2) {
            cam.cameras[0].getWorldPosition(_lockPos);
            cam.cameras[1].getWorldPosition(_eyePosR);
            _lockPos.lerp(_eyePosR, 0.5);
        }
        const off = mesh.userData.offset;
        const pos = off.clone().applyQuaternion(_lockQuat).add(_lockPos);
        mesh.position.copy(pos);
        mesh.quaternion.copy(_lockQuat);
        if (mesh.userData.tilt) {
            _tiltQuat.setFromAxisAngle(new THREE.Vector3(1, 0, 0), mesh.userData.tilt);
            mesh.quaternion.multiply(_tiltQuat);
        }
    }

    // --- Head Pose Sending (quaternion + position) ---
    let lastPoseSendTime = 0;
    const POSE_SEND_INTERVAL = 8; // ~120Hz, control loop picks latest
    const _worldPos = new THREE.Vector3();
    const _worldQuat = new THREE.Quaternion();

    function sendHeadPose(cam) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const now = performance.now();
        if (now - lastPoseSendTime < POSE_SEND_INTERVAL) return;
        lastPoseSendTime = now;

        // Must use getWorld* - XR camera's matrixWorld is set directly
        // from the XR frame, but .position/.quaternion may be stale.
        cam.getWorldPosition(_worldPos);
        cam.getWorldQuaternion(_worldQuat);
        ws.send(JSON.stringify({
            type: "head_pose",
            q: { x: _worldQuat.x, y: _worldQuat.y, z: _worldQuat.z, w: _worldQuat.w },
            p: { x: _worldPos.x, y: _worldPos.y, z: _worldPos.z },
            t: performance.now()
        }));
    }

    // --- Render Loop ---
    let textureReady = false;
    let renderCount = 0;

    renderer.setAnimationLoop(() => {
        // WebRTC: draw video frame to the same canvas used by JPEG
        if (webrtcActive && webrtcVideoEl && webrtcVideoEl.readyState >= webrtcVideoEl.HAVE_CURRENT_DATA) {
            const vw = webrtcVideoEl.videoWidth, vh = webrtcVideoEl.videoHeight;
            if (vw > 100 && vh > 100 && (drawCanvas.width !== vw || drawCanvas.height !== vh)) {
                drawCanvas.width = vw;
                drawCanvas.height = vh;
                SBS_WIDTH = vw;
                uniforms.texSize.value.set(vw, vh);
                applySettings();
                resEl.textContent = `${vw}x${vh} (WebRTC)`;
            }
            drawCtx.drawImage(webrtcVideoEl, 0, 0);
            texture.needsUpdate = true;
        } else if (textureReady) {
            texture.needsUpdate = true;
            textureReady = false;
        }

        const xrCam = renderer.xr.isPresenting ? renderer.xr.getCamera() : camera;

        lockToHead(leftMesh, xrCam);
        lockToHead(rightMesh, xrCam);

        if (renderer.xr.isPresenting) {
            sendHeadPose(xrCam);
            checkControllerButtons();
            lockToHead(hudMesh, xrCam);
            hudMesh.visible = hudVisible;

            // Redraw HUD every 500ms or when state changed
            const now = performance.now();
            if (hudDirty || now - lastHudUpdate > 500) {
                drawHUD();
                hudDirty = false;
                lastHudUpdate = now;
            }
        } else {
            hudMesh.visible = false;
        }

        renderer.render(scene, camera);

        // FPS counting for WebRTC (ws.onmessage binary path is skipped)
        if (webrtcActive) {
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fpsEl.textContent = frameCount;
                frameCount = 0;
                lastFpsTime = now;
            }
        }

        renderCount++;
        if (renderCount % 300 === 0) {
            debugEl.textContent = `renders=${renderCount} xr=${renderer.xr.isPresenting}`;
        }
    });

    camera.position.set(0, 0, 0);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Frame decode ---
    function processLatestFrame() {
        if (decoding || !latestFrameData) return;
        decoding = true;
        const data = latestFrameData;
        latestFrameData = null;

        const blob = new Blob([data], { type: 'image/jpeg' });
        createImageBitmap(blob).then((bmp) => {
            if (drawCanvas.width !== bmp.width || drawCanvas.height !== bmp.height) {
                drawCanvas.width = bmp.width;
                drawCanvas.height = bmp.height;
                SBS_WIDTH = bmp.width;
                uniforms.texSize.value.set(bmp.width, bmp.height);
                console.log('Canvas resized to', bmp.width, bmp.height);
                resEl.textContent = `${bmp.width}x${bmp.height}`;
                // Re-upload texture and recalculate UVs/scaling for new resolution
                texture.dispose();
                applySettings();
            }
            drawCtx.drawImage(bmp, 0, 0);
            bmp.close();
            textureReady = true;
            decoding = false;
            if (latestFrameData) processLatestFrame();
        }).catch((e) => {
            console.error('Frame decode failed:', e);
            decoding = false;
        });
    }

    // --- WebSocket with auto-reconnect ---
    let autoReconnect = true;
    let reconnectTimer = null;
    let reconnectAttempts = 0;
    const RECONNECT_DELAY = 2000; // ms between reconnect attempts

    function updateStatus(state, text) {
        statusEl.className = state;
        statusEl.textContent = text;
    }

    function startStream() {
        console.log('startStream called, attempt:', reconnectAttempts);
        autoReconnect = true;
        clearTimeout(reconnectTimer);

        const label = reconnectAttempts > 0
            ? `Reconnecting (#${reconnectAttempts})...`
            : 'Connecting...';
        updateStatus('connecting', label);
        startBtn.disabled = true;

        const wsUrl = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws`;
        debugEl.textContent = `connecting to ${wsUrl} (#${reconnectAttempts})`;

        try {
            ws = new WebSocket(wsUrl);
        } catch (e) {
            debugEl.textContent = `WS create failed: ${e.message}`;
            console.error('WebSocket creation failed:', e);
            if (autoReconnect) {
                reconnectAttempts++;
                reconnectTimer = setTimeout(startStream, RECONNECT_DELAY);
            }
            return;
        }
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
            console.log('WebSocket connected');
            reconnectAttempts = 0;
            updateStatus('connected', 'Connected');
            stopBtn.disabled = false;
            calibrateBtn.disabled = false;
            positionBtn.disabled = false;
            pauseBtn.disabled = false;
            debugEl.textContent = 'ws open';
        };

        ws.onmessage = (event) => {
            if (typeof event.data === 'string') {
                try { handleServerMessage(JSON.parse(event.data)); } catch(e) {}
                return;
            }

            // Skip JPEG processing when WebRTC is streaming video
            if (webrtcActive) return;

            // Check for frame header (magic 0x5342 'SB')
            const buf = event.data;
            let jpegData = buf;
            if (buf.byteLength > 16) {
                const view = new DataView(buf);
                const magic = view.getUint16(0, true);
                if (magic === 0x5342) {
                    const headerLen = view.getUint16(2, true);
                    // Extract JPEG from after header (avoid copy via Blob slice)
                    jpegData = new Uint8Array(buf, headerLen);
                }
            }

            latestFrameData = jpegData;
            processLatestFrame();

            frameCount++;
            fsEl.textContent = `${(buf.byteLength / 1024).toFixed(0)} KB`;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fpsEl.textContent = frameCount;
                frameCount = 0;
                lastFpsTime = now;
            }
        };

        ws.onclose = (e) => {
            console.log('WebSocket closed:', e.code, e.reason);
            ws = null;
            deactivateWebRTC();
            webrtcAvailable = false;
            if (autoReconnect) {
                reconnectAttempts++;
                const msg = `ws closed (${e.code}), retry #${reconnectAttempts} in ${RECONNECT_DELAY/1000}s`;
                updateStatus('connecting', `Reconnect #${reconnectAttempts}...`);
                startBtn.disabled = true;
                stopBtn.disabled = true;
                debugEl.textContent = msg;
                console.log(msg);
                reconnectTimer = setTimeout(startStream, RECONNECT_DELAY);
            } else {
                updateStatus('disconnected', 'Disconnected');
                startBtn.disabled = false;
                stopBtn.disabled = true;
                debugEl.textContent = `ws closed: ${e.code}`;
            }
        };

        ws.onerror = (e) => {
            console.error('WebSocket error:', e);
            debugEl.textContent = `ws error (retry #${reconnectAttempts + 1} pending)`;
            // onclose will fire after onerror, reconnect handled there
        };
    }

    function stopStream() {
        autoReconnect = false;
        reconnectAttempts = 0;
        clearTimeout(reconnectTimer);
        deactivateWebRTC();
        webrtcAvailable = false;
        if (ws) { ws.close(); ws = null; }
        updateStatus('disconnected', 'Disconnected');
        startBtn.disabled = false;
        stopBtn.disabled = true;
        calibrateBtn.disabled = true;
        positionBtn.disabled = true;
        pauseBtn.disabled = true;
    }

    calibrateBtn.addEventListener('click', () => {
        if (robotState.calibrating) return;
        robotState.calibrating = true;
        updateRobotUI();
        sendCommand('calibrate');
    });
    positionBtn.addEventListener('click', () => {
        sendCommand('toggle_position');
    });
    pauseBtn.addEventListener('click', () => {
        sendCommand('toggle_pause');
    });

    startBtn.addEventListener('click', () => startStream());
    stopBtn.addEventListener('click', () => stopStream());
    window.addEventListener('beforeunload', stopStream);

    debugEl.textContent = 'ready';
    console.log('Init complete');
    </script>
</body>
</html>
